name: CI
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with: { components: "rustfmt, clippy" }
      - run: cargo fmt --all --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      # `corpus_is_byte_identical_to_source` (crates/revops-econ/tests/
      # conformance.rs) is a drift guard against the Python reference corpus
      # at ~/bin/cl_revenue_ops-port (or $REVOPS_PY_CORPUS). This CI runner
      # doesn't check out that sibling repo, so the guard's own
      # `resolve_source_dir` no-ops here (prints "skip ..." and returns) —
      # it only actually compares corpora in a local dev checkout that has
      # both worktrees side by side. Not a gap to "fix" in CI: the guard is
      # deliberately environment-gated rather than faked with a partial
      # checkout.
      - run: cargo test --workspace
      # HARD PRE-DRY-RUN GATE (T6 discovery, T6 review adjudication;
      # `.superpowers/sdd/progress.md`): the deployed binary is a `--release`
      # build, and LLVM's `-O2`+ optimizer rewrites several `powf()` shapes
      # (constant `0.5`/`2.0` exponent, constant `0.5` base) into intrinsics
      # that are NOT bit-identical to CPython's `pow()`-backed `**`. `dev`
      # is unoptimized and never exercises this, so a green `cargo test
      # --workspace` alone cannot catch a regression here — every
      # fixture-compared float path must also pass under `--release`. See
      # `revops_econ::pyfloat::py_pow` for the guard and fix.
      - run: cargo test --workspace --release
